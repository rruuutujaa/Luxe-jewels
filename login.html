<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Luxe Jewels</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap');
        
        html { scroll-behavior: smooth; }
        
        * {
            font-family: 'Montserrat', sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }
        body {
            background: #faf8f3;
            min-height: 100vh;
        }
        .auth-section {
            background: transparent !important;
            padding: 80px 20px;
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .auth-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 500;
            color: #1a1a1a;
            margin: 0 0 14px 0;
            letter-spacing: 0.02em;
        }
        .auth-header p {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            color: #6f6b66;
            margin: 0;
        }
        .auth-container {
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            background: linear-gradient(145deg, #ffffff 0%, #faf8f3 100%);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 24px;
            padding: 48px 44px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1), 0 8px 24px rgba(0, 0, 0, 0.06);
        }
        .auth-container h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 500;
            color: #1a1a1a;
            text-align: center;
            margin: 0 0 32px 0;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.2);
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #6f6b66;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .form-group input {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 14px;
            background: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.04);
        }
        .form-group input:focus {
            outline: none;
            border-color: rgba(212, 175, 55, 0.7);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15), inset 0 2px 6px rgba(0,0,0,0.04);
        }
        .btn-primary {
            width: 100%;
            padding: 18px 32px;
            background: linear-gradient(135deg, #e6c35a 0%, #b8962e 100%);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4);
            margin-top: 10px;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(212, 175, 55, 0.5);
            filter: brightness(1.05);
        }
        .auth-link {
            text-align: center;
            margin-top: 28px;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            color: #6f6b66;
        }
        .auth-link a {
            color: #b49664;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .auth-link a:hover {
            color: #8a6d2e;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>💎 Luxe Jewels</h1>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="cart.html" id="cartLink">Cart <span class="cart-count" id="cartCount">0</span></a></li>
                <li><a href="wishlist.html" id="wishlistLink">Wishlist <span class="wishlist-count" id="wishlistCount">0</span></a></li>
                <li id="logoutItem" style="display: none;"><a href="#" id="logoutLink">Logout</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to continue your luxury journey</p>
        </div>
        <div class="auth-container">
            <h2>Login to Your Account</h2>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                    <span class="error-message" id="emailError"></span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password">
                    <span class="error-message" id="passwordError"></span>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p class="auth-link">
                    Don't have an account? <a href="register.html">Register here</a>
                </p>
                <div id="loginMessage" class="message"></div>
            </form>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('loginMessage');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');

            // Clear previous errors
            emailError.textContent = '';
            passwordError.textContent = '';
            messageDiv.className = 'message';
            messageDiv.textContent = '';

            // Client-side validation
            let isValid = true;

            if (!email) {
                emailError.textContent = 'Email is required';
                isValid = false;
            } else if (!isValidEmail(email)) {
                emailError.textContent = 'Please enter a valid email address';
                isValid = false;
            }

            if (!password) {
                passwordError.textContent = 'Password is required';
                isValid = false;
            } else if (password.length < 6) {
                passwordError.textContent = 'Password must be at least 6 characters';
                isValid = false;
            }

            if (!isValid) return;

            try {
                const response = await login(email, password);
                if (response.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Login successful! Redirecting...';

                    setTimeout(() => {
                        const user = response.user || JSON.parse(localStorage.getItem('user') || '{}');
                        const role = String(user.role || '').toUpperCase();
                        if (role === 'ADMIN') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'user-dashboard.html';
                        }
                    }, 1200);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = response.message || 'Login failed. Please try again.';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Login failed. Please check your credentials.';
                console.error('Login error:', error);
            }
        });

        // Email validation helper function
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
    </script>
</body>
</html>
