<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Luxe Jewels</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap');
        
        html { scroll-behavior: smooth; }
        
        * {
            font-family: 'Montserrat', sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }
        
        body {
            background: linear-gradient(135deg, #faf8f3 0%, #f5efe6 50%, #ebe4d8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Center everything */
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 500;
            color: #1a1a1a;
            margin: 0 0 12px 0;
            letter-spacing: 0.02em;
        }
        
        .auth-header p {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            color: #8a8680;
            margin: 0;
        }
        
        .auth-container {
            max-width: 440px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
            text-align: center;
        }
        
        .auth-container h2 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 500;
            color: #1a1a1a;
            text-align: center;
            margin: 0 0 28px 0;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.15);
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: left;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(212, 175, 55, 0.35);
            border-radius: 12px;
            background: #faf8f3;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: #333;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: rgba(212, 175, 55, 0.8);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.12);
            background: #fff;
        }
        
        .form-group input::placeholder {
            color: #aaa;
        }
        
        .btn-primary {
            width: 100%;
            padding: 16px 32px;
            background: linear-gradient(135deg, #e6c35a 0%, #b8962e 100%);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
            margin-top: 8px;
            text-align: center;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(212, 175, 55, 0.45);
            filter: brightness(1.05);
        }
        
        .auth-link {
            text-align: center;
            margin-top: 24px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: #666;
        }
        
        .auth-link a {
            color: #b49664;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .auth-link a:hover {
            color: #8a6d2e;
            text-decoration: underline;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
        }
        
        .message.success {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            border: 1px solid rgba(40, 167, 69, 0.2);
        }
        
        .message.error {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.2);
        }
        
        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 6px;
            text-align: left;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>💎 Luxe Jewels</h1>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="products.html">Collections</a></li>
                <li id="dashboardItem" style="display:none;"><a href="user-dashboard.html" id="dashboardLink">Dashboard</a></li>
                <li><a href="user-dashboard.html" id="myOrdersLink">My Orders</a></li>
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="cart.html" id="cartLink">Cart <span class="cart-count" id="cartCount">0</span></a></li>
                <li><a href="wishlist.html" id="wishlistLink">Wishlist <span class="wishlist-count" id="wishlistCount">0</span></a></li>
                <li id="logoutItem" style="display: none;"><a href="#" id="logoutLink">Logout</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-wrapper">
        <div>
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to continue your luxury journey</p>
            </div>
            <div class="auth-container">
                <h2>Login to Your Account</h2>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                    <span class="error-message" id="emailError"></span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password">
                    <span class="error-message" id="passwordError"></span>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p class="auth-link">
                    Don't have an account? <a href="register.html">Register here</a>
                </p>
                <div id="loginMessage" class="message"></div>
            </form>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('loginMessage');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');

            // Clear previous errors
            emailError.textContent = '';
            passwordError.textContent = '';
            messageDiv.className = 'message';
            messageDiv.textContent = '';

            // Client-side validation
            let isValid = true;

            if (!email) {
                emailError.textContent = 'Email is required';
                isValid = false;
            } else if (!isValidEmail(email)) {
                emailError.textContent = 'Please enter a valid email address';
                isValid = false;
            }

            if (!password) {
                passwordError.textContent = 'Password is required';
                isValid = false;
            } else if (password.length < 6) {
                passwordError.textContent = 'Password must be at least 6 characters';
                isValid = false;
            }

            if (!isValid) return;

            try {
                const response = await login(email, password);
                if (response.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Login successful! Redirecting...';

                    setTimeout(() => {
                        const user = response.user || {};
                        const role = String(user.role || '').toUpperCase();
                        if (role === 'ADMIN') {
                            window.location.href = 'admin-dashboard.html';
                        } else if (role === 'VENDOR') {
                            window.location.href = 'vendor-dashboard.html';
                        } else {
                            window.location.href = 'user-dashboard.html';
                        }
                    }, 1200);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = response.message || 'Login failed. Please try again.';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = error.message === 'Failed to fetch' 
                    ? 'Network error. Make sure the backend server is running.' 
                    : (error.message || 'Login failed. Please check your credentials.');
                console.error('Login error:', error);
            }
        });

        // Email validation helper function
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
    </script>
</body>
</html>
