        // Load cart items from backend
        async function loadCart() {
            const token = localStorage.getItem('token');
            if (!token) {
                document.getElementById('cartItems').innerHTML = 
                    '<p class="error-message">Please <a href="login.html">login</a> to view your cart.</p>';
                document.getElementById('checkoutBtn').style.display = 'none';
                return;
            }

            try {
                const cartItems = await fetchCartItems();
                displayCartItems(cartItems);
                updateCartSummary(cartItems);
            } catch (error) {
                console.error('Error loading cart:', error);
                document.getElementById('cartItems').innerHTML = 
                    '<p class="error-message">Failed to load cart. Please try again.</p>';
            }
        }

// Display cart items
function displayCartItems(items) {
    const cartItemsDiv = document.getElementById('cartItems');
    
    if (items.length === 0) {
        cartItemsDiv.innerHTML = '<p class="no-products">Your cart is empty. <a href="products.html">Start shopping!</a></p>';
        document.getElementById('checkoutBtn').style.display = 'none';
        return;
    }

    document.getElementById('checkoutBtn').style.display = 'block';

    cartItemsDiv.innerHTML = items.map(item => {
        // SAFETY CHECK - Skip items with null products
        if (!item.product) {
            console.error('Product is null for cart item:', item);
            return ''; // Skip this item
        }
        
        return `
        <div class="cart-item">
            <div class="cart-item-image">
                <img src="${item.product.imageUrl || 'https://via.placeholder.com/150x150?text=Jewellery'}" alt="${item.product.name}">
            </div>
            <div class="cart-item-details">
                <h3>${item.product.name}</h3>
                <p class="cart-item-category">${item.product.category}</p>
                <p class="cart-item-price">₹${item.product.price.toFixed(2)}</p>
            </div>
            <div class="cart-item-controls">
                <div class="quantity-controls">
                    <button onclick="updateQuantity('${item.id}', ${item.quantity - 1})" class="qty-btn">-</button>
                    <span class="quantity">${item.quantity}</span>
                    <button onclick="updateQuantity('${item.id}', ${item.quantity + 1})" class="qty-btn">+</button>
                </div>
                <button onclick="removeFromCart('${item.id}')" class="btn btn-remove">Remove</button>
            </div>
            <div class="cart-item-total">
                <p>₹${(item.product.price * item.quantity).toFixed(2)}</p>
            </div>
        </div>
    `}).filter(Boolean).join(''); // Filter out empty strings
}

        // Update quantity
        async function updateQuantity(cartItemId, newQuantity) {
            if (newQuantity < 1) {
                removeFromCart(cartItemId);
                return;
            }

            try {
                await updateCartItemQuantity(cartItemId, newQuantity);
                showMessage('Cart updated successfully!', 'success');
                loadCart();
                updateCartCount();
            } catch (error) {
                console.error('Error updating quantity:', error);
                showMessage('Failed to update cart. Please try again.', 'error');
            }
        }

        // Remove item from cart
        async function removeFromCart(cartItemId) {
            try {
                await removeCartItem(cartItemId);
                showMessage('Item removed from cart', 'success');
                loadCart();
                updateCartCount();
            } catch (error) {
                console.error('Error removing item:', error);
                showMessage('Failed to remove item. Please try again.', 'error');
            }
        }

        // Update cart summary
        function updateCartSummary(items) {
            const subtotal = items.reduce((sum, item) => {
                // Safety check for null product
                if (!item.product) return sum;
                return sum + (item.product.price * item.quantity);
            }, 0);
            
            const tax = subtotal * 0.10; // 10% tax
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = `₹${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `₹${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `₹${total.toFixed(2)}`;
        }

        // Show message
        function showMessage(message, type) {
            const messageDiv = document.getElementById('cartMessage');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            setTimeout(() => {
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            }, 3000);
        }
